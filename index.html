<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avistock - Inicio</title>
    <!-- Si tienes un CSS para el index, puedes enlazarlo aquí. 
         Por ejemplo, si tienes un estilos.css en css-global: 
         <link rel="stylesheet" href="css-global/estilos.css"> -->
    <style>
        /* Unos estilos rápidos y limpios por si no tienes un CSS asignado aún */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }
        .welcome-container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        p {
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            background-color: #3498db;
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .btn:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

    <div class="welcome-container">
        <!-- Puedes colocar aquí un logo de tu carpeta de assets si lo deseas -->
        <!-- <img src="assets-global/tu-logo.png" alt="Avistock Logo" style="width: 100px;"> -->
        
        <h1>Bienvenido a Avistock</h1>
        <p>Tu sistema de control de inventario y ventas favorito.</p>
        
        <!-- REDIRECCIÓN CORRECTA: Como index.html está afuera, entra directamente a la carpeta html-global -->
        <a href="html-global/login.html" class="btn">Ingresar al Sistema</a>
    </div>

</body>
</html>
