<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avistock - Cierre de Caja</title>
    <link rel="stylesheet" href="../css-global/admi.css">
</head>
<body class="app-body">

    <div class="app-container">
        
        <!-- ==========================================
             BARRA LATERAL (SIDEBAR) UNIFICADA
             ========================================== -->
        <aside class="sidebar">
            <div class="brand">
                <img src="../assets-global/LogoAvi 1.png" alt="Avistock" class="brand-logo" onerror="this.src='https://placehold.co/100x100?text=Avistock';">
            </div>
            
            <nav class="nav-menu">
                <a href="ventas.html" class="nav-item">
                    <div class="nav-icon-wrapper">
                        <img src="../assets-global/carrito-de-compras.png" alt="Ventas" class="icon-nav">
                    </div> 
                    Ventas
                </a>
                <a href="pedidos.html" class="nav-item">
                    <div class="nav-icon-wrapper">
                        <img src="../assets-global/acuerdo-de-contrato.png" alt="Pedidos" class="icon-nav">
                    </div> 
                    Pedidos
                </a>
                <a href="historial.html" class="nav-item">
                    <div class="nav-icon-wrapper">
                        <img src="../assets-global/historial-de-pedidos.png" alt="Historial" class="icon-nav">
                    </div> 
                    Historial
                </a>
                <a href="inventario.html" class="nav-item">
                    <div class="nav-icon-wrapper">
                        <img src="../assets-global/lista-de-verificacion.png" alt="Inventario" class="icon-nav">
                    </div> 
                    Inventario
                </a>
                <a href="cierre_caja.html" class="nav-item active">
                    <div class="nav-icon-wrapper">
                        <img src="../assets-global/caja-registradora.png" alt="Cierre de caja" class="icon-nav">
                    </div> 
                    Cierre de caja
                </a>
            </nav>

            <a href="#" onclick="cerrarSesion(event)" class="logout-btn">
                <div class="nav-icon-wrapper">
                    <img src="../assets-global/salida.png" alt="Cerrar sesión" class="icon-nav">
                </div> 
                Cerrar sesión
            </a>
        </aside>

        <!-- ==========================================
             CONTENIDO PRINCIPAL: CIERRE DE CAJA
             ========================================== -->
        <main class="main-content">
            <header class="content-header" style="margin-bottom: 24px;">
                <div class="header-titles">
                    <p class="breadcrumbs" style="font-size: 0.85rem; color: #64748b; margin-bottom: 4px;">Administrador &gt; Cierre de caja</p>
                    <h1 style="font-size: 1.8rem; font-weight: 700; color: #1e293b; margin: 0;">Cierre de caja</h1>
                    <p class="subtitle" style="font-size: 0.95rem; color: #64748b; margin-top: 4px;">Resumen del día y corte final</p>
                </div>
            </header>

            <div class="cierre-layout-vertical">
                
                <!-- TARJETA 1: RESUMEN DEL DÍA -->
                <div class="ventas-card" style="margin-bottom: 24px;">
                    <div style="padding: 24px 32px 12px 32px; border-bottom: 1px solid #f1f5f9;">
                        <h2 style="font-size: 1.1rem; font-weight: 700; color: #1e293b; margin: 0;">Resumen del día</h2>
                    </div>
                    
                    <div class="resumen-items-container" id="resumen-cierre-items">
                        <!-- Se inyecta dinámicamente con los tickets del día -->
                    </div>

                    <!-- Totales del resumen -->
                    <div class="resumen-totales-footer">
                        <div class="totales-row-main">
                            <span class="lbl-main">Total ventas</span>
                            <span class="val-main" id="cierre-total-ventas">$ 4,290</span>
                        </div>
                        <div class="totales-row-sub">
                            <span class="lbl-sub">Mermas</span>
                            <span class="val-sub color-danger" id="cierre-total-mermas">-$ 112</span>
                        </div>
                        <div class="totales-row-sub">
                            <span class="lbl-sub">Pedidos web</span>
                            <span class="val-sub" id="cierre-total-pedidos">4 entregados</span>
                        </div>
                    </div>
                </div>

                <!-- TARJETA 2: DECLARAR EFECTIVO -->
                <div class="ventas-card">
                    <div style="padding: 24px 32px 12px 32px;">
                        <h2 style="font-size: 1.1rem; font-weight: 700; color: #1e293b; margin: 0;">Declarar efectivo</h2>
                    </div>
                    
                    <form id="form-cierre-caja" style="padding: 0 32px 32px 32px;" onsubmit="procesarCierreCaja(event)">
                        <div class="cierre-form-row">
                            <div class="form-group-cierre">
                                <label for="cierre-efectivo">Efectivo</label>
                                <input type="text" id="cierre-efectivo" placeholder="$ 0.00" oninput="formatearMonedaInput(this)">
                            </div>
                        </div>

                        <div class="form-group-cierre" style="margin-top: 20px;">
                            <label for="cierre-notas">Notas del cierre</label>
                            <textarea id="cierre-notas" rows="4" placeholder="Observaciones opcionales..."></textarea>
                        </div>

                        <div style="margin-top: 28px;">
                            <button type="submit" class="btn-cierre-submit" id="btn-submit-cierre">Cerrar caja</button>
                        </div>
                    </form>
                </div>

            </div>
        </main>
    </div>

    <!-- Contenedor de notificaciones toast -->
    <div class="notification-container" id="notification-container"></div>

    <script src="../js-global/admi.js"></script>
    <script>
        function cerrarSesion(event) {
            event.preventDefault();
            if (confirm("¿Estás seguro de que quieres cerrar sesión?")) {
                window.location.href = "login.html";
            }
        }
    </script>
</body>
</html>
