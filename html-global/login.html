<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avistock - Iniciar Sesión</title>
    <!-- Ruta relativa correcta hacia tu CSS global -->
    <link rel="stylesheet" href="../css-global/login.css">
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            
            <!-- Tu logo de Avistock exacto -->
            <div class="login-logo">
                <img src="../assets-global/LOGO_Avistock 3.png" alt="Avistock Logo">
            </div>

            <!-- Cabecera del login con tu icono para el login -->
            <div class="login-header">
                <img src="../assets-global/icono para el login.png" alt="Icono Login">
                <h2>¡Hola de nuevo!</h2>
                <p>Ingresa tus datos para acceder al sistema</p>
            </div>

            <!-- Caja de error dinámica para cuando fallen las credenciales -->
            <div class="alert-box" id="login-error-msg"></div>

            <!-- Formulario de acceso -->
            <form class="login-form" id="form-login" novalidate>
                
                <!-- Input Usuario / Correo con tu icono de usuario -->
                <div class="input-group">
                    <label for="username">Nombre de Usuario o Correo</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <img src="../assets-global/icono de usuario login.png" alt="User Icon" width="16">
                        </span>
                        <input type="text" id="username" placeholder="ejemplo123" required>
                    </div>
                </div>

                <!-- Input Contraseña con tu icono de candado -->
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <img src="../assets-global/icono candado.png" alt="Lock Icon" width="16">
                        </span>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                </div>

                <!-- Opciones inferiores (Recordarme y Olvidé mi contraseña) -->
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="remember"> Recordarme
                    </label>
                    <a href="recuperar.html" class="forgot-pass">¿Olvidaste tu contraseña?</a>
                </div>

                <!-- Botón de Iniciar Sesión -->
                <button type="submit" class="btn-login">Iniciar Sesión</button>

            </form>

            <!-- Enlace para registrarse -->
            <div class="login-footer">
                <p>¿No tienes una cuenta todavía? <a href="registro.html">Regístrate aquí</a></p>
            </div>

        </div>
    </div>

    <!-- Tu script unificado conectado -->
    <script src="../js-global/login.js"></script>
</body>
</html>
