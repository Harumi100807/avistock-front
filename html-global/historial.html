<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avistock - Historial de Ventas</title>
    <link rel="stylesheet" href="../css-global/admi.css">
</head>
<body class="app-body">

    <div class="app-container">
        
        <!-- ==========================================
             BARRA LATERAL (SIDEBAR) UNIFICADA
             ========================================== -->
        <aside class="sidebar">
            <div class="brand">
                <img src="../assets-global/LogoAvi 1.png" alt="Avistock" class="brand-logo" onerror="this.src='https://placehold.co/100x100?text=Avistock';">
            </div>
            
            <nav class="nav-menu">
                <a href="ventas.html" class="nav-item">
                    <div class="nav-icon-wrapper">
                        <img src="../assets-global/carrito-de-compras.png" alt="Ventas" class="icon-nav">
                    </div> 
                    Ventas
                </a>
                <a href="pedidos.html" class="nav-item">
                    <div class="nav-icon-wrapper">
                        <img src="../assets-global/acuerdo-de-contrato.png" alt="Pedidos" class="icon-nav">
                    </div> 
                    Pedidos
                </a>
                <a href="historial.html" class="nav-item active">
                    <div class="nav-icon-wrapper">
                        <img src="../assets-global/historial-de-pedidos.png" alt="Historial" class="icon-nav">
                    </div> 
                    Historial
                </a>
                <a href="inventario.html" class="nav-item">
                    <div class="nav-icon-wrapper">
                        <img src="../assets-global/lista-de-verificacion.png" alt="Inventario" class="icon-nav">
                    </div> 
                    Inventario
                </a>
                <a href="cierre_caja.html" class="nav-item">
                    <div class="nav-icon-wrapper">
                        <img src="../assets-global/caja-registradora.png" alt="Cierre de caja" class="icon-nav">
                    </div> 
                    Cierre de caja
                </a>
            </nav>

            <a href="#" onclick="cerrarSesion(event)" class="logout-btn">
                <div class="nav-icon-wrapper">
                    <img src="../assets-global/salida.png" alt="Cerrar sesión" class="icon-nav">
                </div> 
                Cerrar sesión
            </a>
        </aside>

        <!-- ==========================================
             CONTENIDO PRINCIPAL: HISTORIAL
             ========================================== -->
        <main class="main-content">
            <header class="content-header" style="margin-bottom: 24px;">
                <div class="header-titles">
                    <p class="breadcrumbs" style="font-size: 0.85rem; color: #64748b; margin-bottom: 4px;">Administrador > Historial</p>
                    <h1 style="font-size: 1.8rem; font-weight: 700; color: #1e293b; margin: 0;">Historial de ventas</h1>
                    <p class="subtitle" style="font-size: 0.95rem; color: #64748b; margin-top: 4px;">Registro del día — ventas en mostrador y pedidos web</p>
                </div>
            </header>

            <!-- CONTENEDOR DE CONTROL: PESTAÑAS (IZQ) Y BUSCADOR (DER) -->
            <div class="historial-controls-row">
                <div class="tabs-container" style="border-bottom: none; margin-bottom: 0; padding-bottom: 0;">
                    <button class="tab-btn active" id="tab-mostrador" onclick="filtrarHistorial('mostrador', this)">
                        Ventas <span class="tab-badge" id="badge-historial-mostrador">0</span>
                    </button>
                    <button class="tab-btn" id="tab-web" onclick="filtrarHistorial('pedidos-web', this)">
                        Pedidos web <span class="tab-badge" id="badge-historial-web">0</span>
                    </button>
                </div>
                
                <div class="search-box-wrapper">
                    <input type="text" id="search-historial" placeholder="Buscar cliente o ticket..." oninput="buscarEnHistorial()">
                </div>
            </div>

            <!-- TARJETA CON TABLA DE REGISTROS -->
            <div class="ventas-card" style="margin-top: 16px;">
                <div class="table-wrapper">
                    <table style="width: 100%; border-collapse: collapse;">
                        <thead>
                            <tr>
                                <th style="width: 180px;">Ticket / Hora</th>
                                <th>Cliente</th>
                                <th>Tipo</th>
                                <th>Productos</th>
                                <th>Total</th>
                                <th style="text-align: right; padding-right: 32px;">Estado</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-historial-rows">
                            <!-- Inyección dinámica -->
                        </tbody>
                    </table>
                </div>

                <!-- Footer sutil del Historial (Monto derecho) -->
                <div class="card-footer" style="background-color: #ffffff; border-top: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; padding: 20px 32px;">
                    <span style="font-weight: 600; color: #64748b; font-size: 0.9rem;">Total del día</span>
                    <span id="total-historial-monto" style="font-weight: 800; color: #ea580c; font-size: 1.25rem;">$ 0.00</span>
                </div>
            </div>
        </main>
    </div>

    <script src="../js-global/admi.js"></script>
    <script>
        function cerrarSesion(event) {
            event.preventDefault();
            if (confirm("¿Estás seguro de que quieres cerrar sesión?")) {
                window.location.href = "login.html";
            }
        }
    </script>
</body>
</html>
